<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>プライバシーポリシー | 鹿児島地域交通通信社</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Noto+Serif+JP:wght@400;700&display=swap"
    rel="stylesheet">
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <style>
    :root {
      --main: #1B3A6B;
      --main-dark: #122851;
      --main-light: #EEF3FA;
      --sub: #2E5FA3;
      --sub-light: #D0DCF0;
      --accent: #E07B1A;
      --accent-dark: #B85E0D;
      --text-1: #0F1B2E;
      --text-2: #4A5568;
      --text-3: #7A8A9E;
      --border: #D8E4F0;
      --bg: #F4F7FB;
      --white: #FFFFFF;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
      background: var(--bg);
      color: var(--text-1);
      -webkit-font-smoothing: antialiased;
    }

    a {
      color: var(--sub);
      text-decoration: none;
    }

    a:hover {
      color: var(--main);
      text-decoration: underline;
    }

    button {
      font-family: inherit;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const C = {
      main: '#1B3A6B', mainDark: '#122851', mainLight: '#EEF3FA',
      sub: '#2E5FA3', subLight: '#D0DCF0',
      accent: '#E07B1A', accentDark: '#B85E0D',
      t1: '#0F1B2E', t2: '#4A5568', t3: '#7A8A9E',
      border: '#D8E4F0', bg: '#F4F7FB', white: '#FFFFFF',
    };

    /* ─── Header (index.htmlと同一) ─── */
    const Header = ({ menuOpen, setMenuOpen }) => (
      <header style={{ background: C.white, borderBottom: `4px solid ${C.main}`, position: 'sticky', top: 0, zIndex: 200 }}>
        <div style={{ background: C.main, color: 'rgba(255,255,255,0.75)', padding: '4px 0' }}>
          <div style={{ maxWidth: 1160, margin: '0 auto', padding: '0 16px', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 'clamp(8px,2.5vw,11px)', whiteSpace: 'nowrap' }}>公共交通と地域文化を世の中へ</span>
            <div style={{ display: 'flex', gap: 16 }}>
              {[['X (Twitter)', 'https://twitter.com/humitabphotnews'], ['note', 'https://note.com/humitabinewsphot'], ['TikTok', 'https://www.tiktok.com/@humitabitrafficnewsphoto']].map(([lbl, href]) => (
                <a key={lbl} href={href} target="_blank" rel="noreferrer" style={{ color: 'rgba(255,255,255,0.75)', fontSize: 'clamp(8px,2.5vw,11px)' }}>{lbl}</a>
              ))}
            </div>
          </div>
        </div>
        <div style={{ maxWidth: 1160, margin: '0 auto', padding: '0 16px', height: 56, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <a href="index.html" style={{ display: 'flex', alignItems: 'center', gap: 10, textDecoration: 'none' }}>
            <div style={{ width: 5, height: 44, background: C.accent, borderRadius: 2 }}></div>
            <div>
              <div style={{ fontFamily: "'Noto Serif JP',serif", fontSize: 'clamp(13px,4.5vw,20px)', fontWeight: 700, color: C.main, lineHeight: 1.1, letterSpacing: -0.5, whiteSpace: 'nowrap' }}>鹿児島地域交通通信社</div>
              <div style={{ fontSize: 'clamp(7px,2vw,10px)', color: C.t3, letterSpacing: 1, marginTop: 1, whiteSpace: 'nowrap' }}>Kagoshima regional transport news agency</div>
            </div>
          </a>
          <button onClick={() => setMenuOpen(!menuOpen)} style={{ background: 'none', border: 'none', padding: '2px 4px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 2 }}>
            <div style={{ width: 24, height: 18, display: 'flex', flexDirection: 'column', justifyContent: 'space-between' }}>
              {[0, 1, 2].map(i => (
                <span key={i} style={{
                  display: 'block', width: 24, height: 2.5, background: C.main, borderRadius: 2,
                  transition: 'all 0.3s ease',
                  transform: i === 0 && menuOpen ? 'translateY(7.75px) rotate(45deg)' : i === 2 && menuOpen ? 'translateY(-7.75px) rotate(-45deg)' : 'none',
                  opacity: i === 1 && menuOpen ? 0 : 1,
                }}></span>
              ))}
            </div>
            <span style={{ fontSize: 9, color: C.t2, fontWeight: 700, letterSpacing: '0.05em', lineHeight: 1 }}>メニュー</span>
          </button>
        </div>
      </header>
    );

    /* ─── Mobile menu (index.htmlと同一) ─── */
    const MobileMenu = ({ open, onClose }) => {
      useEffect(() => {
        document.body.style.overflow = open ? 'hidden' : '';
        return () => { document.body.style.overflow = ''; };
      }, [open]);
      if (!open) return null;
      const sections = [
        {
          title: 'カテゴリ', items: [
            { label: 'すべての記事', href: 'index.html' },
            { label: '🚃 鉄道', href: 'archive.html?cat=鉄道' },
            { label: '✈️ 航空', href: 'archive.html?cat=航空' },
            { label: '🚢 船舶', href: 'archive.html?cat=船舶' },
            { label: '🚌 バス', href: 'archive.html?cat=バス' },
            { label: '📍 地域話題', href: 'archive.html?cat=地域話題' },
          ]
        },
        {
          title: 'コンテンツ', items: [
            { label: '記事一覧', href: 'articles.html' },
            { label: '概要案内', href: 'about.html' },
            { label: 'お問い合わせ', href: 'contact.html' },
          ]
        },
        {
          title: '公式SNS・メディア', items: [
            { label: 'X（旧Twitter）— 交通速報', href: 'https://twitter.com/humitabphotnews', dot: '#000' },
            { label: 'note — 過去の交通記事', href: 'https://note.com/humitabinewsphot', dot: '#1A1A1A' },
            { label: 'Instagram — 写真・動画', href: 'https://www.instagram.com/humitabiphoto/', dot: '#C13584' },
            { label: 'TikTok — 動画コンテンツ', href: 'https://www.tiktok.com/@humitabitrafficnewsphoto', dot: '#010101' },
          ]
        },
      ];
      return (
        <div style={{ position: 'fixed', top: 85, left: 0, right: 0, bottom: 0, zIndex: 190, background: 'rgba(15,27,46,0.55)' }} onClick={onClose}>
          <div style={{ position: 'absolute', top: 0, right: 0, width: '100%', maxWidth: 360, height: '100%', background: C.white, overflowY: 'auto', boxShadow: '-4px 0 24px rgba(15,27,46,0.15)', padding: '48px 0 32px' }} onClick={e => e.stopPropagation()}>
            {sections.map((s, si) => (
              <div key={si} style={{ padding: '0 24px', marginBottom: 24 }}>
                <div style={{ fontSize: 11, fontWeight: 700, color: C.t3, letterSpacing: '0.1em', textTransform: 'uppercase', marginBottom: 10, paddingBottom: 6, borderBottom: `2px solid ${C.border}` }}>{s.title}</div>
                <div style={{ display: 'flex', flexDirection: 'column', gap: 2 }}>
                  {s.items.map((item, ii) => (
                    <a key={ii} href={item.href} target={item.href.startsWith('http') ? '_blank' : undefined} rel="noreferrer" onClick={onClose}
                      style={{ display: 'flex', alignItems: 'center', gap: 10, padding: '10px 12px', borderRadius: 6, fontSize: 14, color: C.t1, textDecoration: 'none' }}
                      onMouseEnter={e => e.currentTarget.style.background = C.bg}
                      onMouseLeave={e => e.currentTarget.style.background = 'transparent'}
                    >
                      {item.dot && <span style={{ width: 8, height: 8, borderRadius: '50%', background: item.dot, flexShrink: 0 }}></span>}
                      {item.label}
                    </a>
                  ))}
                </div>
              </div>
            ))}
            <div style={{ padding: '0 24px' }}>
              <div style={{ background: C.main, borderRadius: 8, padding: 20 }}>
                <div style={{ fontSize: 11, opacity: 0.75, marginBottom: 4, color: '#fff' }}>お問い合わせ</div>
                <div style={{ fontSize: 14, fontWeight: 700, marginBottom: 10, color: '#fff' }}>E-MAIL</div>
                <a href="mailto:kagoshimaregionaltransport@kagoshima-news.jp" style={{ display: 'block', background: C.accent, color: '#fff', borderRadius: 6, padding: '10px 14px', fontSize: 13, fontWeight: 700, textAlign: 'center', wordBreak: 'break-all', textDecoration: 'none' }}>kagoshimaregionaltransport@kagoshima-news.jp</a>
                <div style={{ fontSize: 10, opacity: 0.6, marginTop: 8, lineHeight: 1.6, color: '#fff' }}>お電話での対応は行っておりません。</div>
              </div>
            </div>
          </div>
        </div>
      );
    };

    /* ─── Footer (index.htmlと同一) ─── */
    const Footer = () => (
      <footer style={{ background: C.mainDark, marginTop: 48, padding: '32px 0 20px' }}>
        <div style={{ maxWidth: 1160, margin: '0 auto', padding: '0 16px' }}>
          <div style={{ display: 'flex', gap: 10, alignItems: 'center', marginBottom: 16 }}>
            <div style={{ width: 4, height: 32, background: C.accent, borderRadius: 2 }}></div>
            <div>
              <div style={{ fontFamily: "'Noto Serif JP',serif", fontSize: 16, fontWeight: 700, color: '#fff' }}>鹿児島地域交通通信社</div>
              <div style={{ fontSize: 10, color: 'rgba(255,255,255,0.45)', letterSpacing: 1 }}>Kagoshima regional transport news agency</div>
            </div>
          </div>
          <div style={{ display: 'flex', gap: 20, flexWrap: 'wrap', marginBottom: 20 }}>
            {[
              ['X（旧Twitter）', 'https://twitter.com/humitabphotnews'],
              ['Instagram', 'https://www.instagram.com/humitabiphoto/'],
              ['TikTok', 'https://www.tiktok.com/@humitabitrafficnewsphoto'],
              ['お問い合わせ', 'contact.html'],
              ['プライバシーポリシー', 'privacy.html'],
            ].map(([lbl, href]) => (
              <a key={lbl} href={href} target={href.startsWith('http') ? '_blank' : undefined} rel="noreferrer" style={{ color: 'rgba(255,255,255,0.55)', fontSize: 12 }}>{lbl}</a>
            ))}
          </div>
          <div style={{ borderTop: '1px solid rgba(255,255,255,0.1)', paddingTop: 16, display: 'flex', justifyContent: 'space-between', flexWrap: 'wrap', gap: 8 }}>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>© 鹿児島地域交通通信社 All Rights Reserved.</div>
            <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.35)' }}>E-MAIL: kagoshimaregionaltransport@kagoshima-news.jp</div>
          </div>
        </div>
      </footer>
    );

    /* ═══════════════════════════════════
       MAIN APP
    ══════════════════════════════════ */
    function App() {
      const [menuOpen, setMenuOpen] = useState(false);

      return (
        <div>
          <Header menuOpen={menuOpen} setMenuOpen={setMenuOpen} />
          <MobileMenu open={menuOpen} onClose={() => setMenuOpen(false)} />

          {/* パンくず */}
          <div style={{ background: C.white, borderBottom: `1px solid ${C.border}` }}>
            <div style={{ maxWidth: 1160, margin: '0 auto', padding: '8px 16px', display: 'flex', gap: 8, alignItems: 'center', fontSize: 12, color: C.t3 }}>
              <a href="index.html" style={{ color: C.sub }}>トップ</a>
              <span>›</span>
              <span style={{ color: C.t1 }}>プライバシーポリシー</span>
            </div>
          </div>

          <main style={{ maxWidth: 720, margin: '0 auto', padding: '40px 16px 80px' }}>

            <div style={{ marginBottom: 40, textAlign: 'center' }}>
              <h1 style={{ fontFamily: "'Noto Serif JP',serif", fontSize: 24, fontWeight: 700, color: C.t1, marginBottom: 12 }}>プライバシーポリシー</h1>
              <div style={{ fontSize: 13, color: C.t2, lineHeight: 1.6 }}>
                鹿児島地域交通通信社（以下「当社」）における個人情報の取り扱い方針です。
              </div>
            </div>

            <div style={{ background: C.white, borderRadius: 8, boxShadow: '0 2px 12px rgba(27,58,107,0.06)', padding: '40px 32px' }}>
              <p style={{ fontSize: 13, color: C.t2, lineHeight: 1.9, marginBottom: 24 }}>
                鹿児島地域交通通信社（以下「当社」）は、ご利用者の個人情報の保護を重要な責務と認識し、以下のポリシーに従って適切に取り扱います。
              </p>
              {[
                { title: '個人情報の収集・利用', text: '当社は、お問い合わせへの対応・サービス改善・記事品質向上のために必要な範囲で個人情報を収集することがあります。収集した情報は、目的以外の用途には使用しません。' },
                { title: '第三者への提供', text: '当社は、法令に基づく場合を除き、ご本人の同意なく個人情報を第三者に提供・開示することはありません。' },
                { title: 'アクセス解析', text: '当サイトでは、サービス改善のためにアクセス解析ツールを使用する場合があります。収集データは個人を特定するものではありません。' },
                { title: '免責事項', text: '当社が提供する情報は可能な限り正確な情報を掲載するよう努めておりますが、情報の正確性・安全性等を保証するものではありません。掲載情報による損害について、当社は一切の責任を負いません。' },
                { title: '著作権', text: '当サイトに掲載されている文章・写真・動画等の著作権は、鹿児島地域交通通信社および各権利者に帰属します。無断転載・複製は禁じます。' },
                { title: 'お問い合わせ', text: 'プライバシーポリシーに関するお問い合わせは、下記メールアドレスまでご連絡ください。' },
              ].map(({ title, text }) => (
                <div key={title} style={{ borderLeft: `3px solid ${C.sub}`, paddingLeft: 16, marginBottom: 20 }}>
                  <div style={{ fontSize: 14, fontWeight: 700, color: C.main, marginBottom: 8 }}>{title}</div>
                  <p style={{ fontSize: 13, color: C.t2, lineHeight: 1.8, margin: 0 }}>{text}</p>
                </div>
              ))}
              
              <div style={{ marginTop: 24, padding: '16px 20px', background: '#F8FAFC', border: `1px solid ${C.border}`, borderRadius: 4, fontSize: 13, color: C.t2, lineHeight: 1.8 }}>
                <div style={{ fontSize: 14, fontWeight: 700, color: C.main, marginBottom: 8, borderBottom: `1px solid ${C.border}`, paddingBottom: 6 }}>運営者情報</div>
                <div><span style={{ fontWeight: 700, color: C.t1, display: 'inline-block', width: 70 }}>運営者：</span>鹿児島地域交通通信社　代表 川畑篤史</div>
                <div><span style={{ fontWeight: 700, color: C.t1, display: 'inline-block', width: 70 }}>所在地：</span>〒892-0816 鹿児島県鹿児島市山下町17-4 第一照国ビル ヨコチャレの事務所内</div>
                <div><span style={{ fontWeight: 700, color: C.t1, display: 'inline-block', width: 70 }}>電話番号：</span>080-4205-3515</div>
                <div><span style={{ fontWeight: 700, color: C.t1, display: 'inline-block', width: 70 }}>E-MAIL：</span><a href="mailto:kagoshimaregionaltransport@kagoshima-news.jp" style={{ color: C.sub }}>kagoshimaregionaltransport@kagoshima-news.jp</a></div>
              </div>
            </div>

          </main>

          <Footer />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>

</html>
