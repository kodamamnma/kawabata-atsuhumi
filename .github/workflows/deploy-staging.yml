name: Deploy to Staging

on:
  push:
    branches: [ develop ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: PHP Syntax Check
      uses: ./.github/actions/php-syntax-check
  
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up SSH
      uses: webfactory/ssh-agent@v0.9.0
      with:
        ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}

    - name: Setup known_hosts
      run: |
        mkdir -p ~/.ssh
        chmod 700 ~/.ssh
        SSH_HOST="${{ secrets.STAGING_SERVER_HOST }}"
        ssh-keyscan -p 10022 "${SSH_HOST}" >> ~/.ssh/known_hosts 2>/dev/null
        chmod 644 ~/.ssh/known_hosts

    - name: Test SSH connection
      run: |
        SSH_HOST="${{ secrets.STAGING_SERVER_HOST }}"
        SSH_USER="${{ secrets.STAGING_SERVER_USER }}"
        ssh -o ConnectTimeout=10 -p 10022 "${SSH_USER}@${SSH_HOST}" "echo 'SSH connection successful'"

    - name: Ensure target theme directory exists on remote
      run: |
        SSH_HOST="${{ secrets.STAGING_SERVER_HOST }}"
        SSH_USER="${{ secrets.STAGING_SERVER_USER }}"
        THEME_PATH="${{ secrets.STAGING_THEME_PATH }}"
        ssh -p 10022 "${SSH_USER}@${SSH_HOST}" "mkdir -p \"${THEME_PATH}\""

    - name: Rsync theme files to Staging
      run: |
        SSH_HOST="${{ secrets.STAGING_SERVER_HOST }}"
        SSH_USER="${{ secrets.STAGING_SERVER_USER }}"
        THEME_PATH="${{ secrets.STAGING_THEME_PATH }}"
        rsync -avzc --delete --exclude='.*' --exclude README.md -e "ssh -p 10022 -o ConnectTimeout=10" ./ "${SSH_USER}@${SSH_HOST}:${THEME_PATH}"