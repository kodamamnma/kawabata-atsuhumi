name: Deploy to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: PHP Syntax Check
      uses: ./.github/actions/php-syntax-check
  
  deploy:
    needs: test
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via FTP
      uses: SamKirkland/FTP-Deploy-Action@v4.3.5
      with:
        server: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        password: ${{ secrets.SERVER_PASSWORD }}
        protocol: ftps
        port: 21
        local-dir: ./kawabata-wp-theme/
        server-dir: ${{ secrets.PRODUCTION_THEME_PATH }}/
        exclude: |
          **/.git*
          **/.git*/**
          **/node_modules/**
          **/README.md
          **/.github/**

    - name: Verify deployment
      run: |
        echo "✅ Deployment completed successfully"
        echo "Files deployed to: ${{ secrets.PRODUCTION_THEME_PATH }}"

  release:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    - name: Get version from style.css
      id: version
      run: |
        VERSION=$(grep -m 1 -i 'Version:' kawabata-wp-theme/style.css | awk '{print $2}' | tr -d '\r')
        echo "version-without-v=${VERSION}" >> $GITHUB_OUTPUT
    - name: Release Drafter
      uses: release-drafter/release-drafter@v6
      with:
        publish: true
        version: ${{ steps.version.outputs.version-without-v }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}